name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Tests
        run: uv run pytest -v --tb=short

  self-scan:
    name: supSec scans itself
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install
        run: uv sync

      - name: Run supSec on this repo
        run: |
          uv run supsec scan . --fail-on critical
          uv run supsec scan . --fmt sarif -o supsec-report.sarif
          uv run supsec scan . --fmt markdown -o supsec-report.md

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: supsec-report.sarif
        continue-on-error: true

      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supsec-report
          path: supsec-report.md
