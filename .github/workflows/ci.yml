name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check src/ tests/

      - name: Format check
        run: poetry run ruff format --check src/ tests/

      - name: Tests
        run: poetry run pytest -v --tb=short

  self-scan:
    name: supSec scans itself
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Install
        run: poetry install --no-interaction

      - name: Run supSec on this repo
        run: |
          poetry run supsec scan . --format console --fail-on critical
          poetry run supsec scan . --format sarif -o supsec-report.sarif
          poetry run supsec scan . --format markdown -o supsec-report.md

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: supsec-report.sarif
        continue-on-error: true

      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supsec-report
          path: supsec-report.md
